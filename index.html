<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Md. Yousuf Hossain | Portfolio Pro</title>
  
  <meta name="description" content="Portfolio of Md. Yousuf Hossain - Aspiring Cybersecurity Specialist and Computer Science undergraduate.">

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS -->
  <link rel="stylesheet" href="styles.css?v=20260414">
</head>
<body class="loading">

  <!-- Canvas Background for "Max" Upgrade -->
  <canvas id="bg-canvas" style="position:fixed; top:0; left:0; z-index:-1;"></canvas>

  <!-- Sticky Navigation -->
  <nav class="sticky-nav" id="stickyNav">
    <div class="nav-container">
      <div class="nav-left" id="nav-links">
        <!-- Links populated by JS -->
      </div>
      <div class="nav-right">
        <div class="visitor-counter">
          <span class="counter-label">Visitors:</span>
          <span class="counter-value" id="visitorCount">...</span>
        </div>
        <button id="admin-trigger" title="Admin Panel (Ctrl+Shift+A)" class="admin-shield">🛡️</button>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <header id="header-section">
      <!-- Populated by JS -->
    </header>

    <div class="grid">
      <main id="main-content">
        <!-- Sections like About, Skills, Projects populated by JS -->
      </main>

      <aside id="aside-content">
        <!-- Profile info and social links populated by JS -->
      </aside>
    </div>

    <footer>
      &copy; <span id="year"></span> • Md. Yousuf Hossain • <a href="javascript:void(0)" id="footer-admin-link" style="color:inherit; text-decoration:none; opacity:0.5;">Built for the Future</a>
    </footer>
  </div>

  <!-- Admin Dashboard Modal -->
  <div id="dashboard-modal" class="modal">
    <div class="modal-content dashboard-content">
      <div class="dashboard-sidebar">
        <div class="sidebar-header">🛠️ Admin</div>
        <nav class="sidebar-nav">
          <button class="tab-btn active" data-tab="identity">Identity</button>
          <button class="tab-btn" data-tab="summary">Summary</button>
          <button class="tab-btn" data-tab="skills">Skills</button>
          <button class="tab-btn" data-tab="projects">Projects</button>
          <button class="tab-btn" data-tab="publications">Publications</button>
          <button class="tab-btn" data-tab="timeline">Timeline</button>
          <button class="tab-btn" data-tab="social">Socials</button>
        </nav>
      </div>
      <div class="dashboard-main">
        <div class="modal-header">
          <h2 id="current-tab-title">Identity</h2>
          <div class="header-actions">
             <button id="close-dashboard" class="close-btn">&times;</button>
          </div>
        </div>
        <div class="modal-body" id="dashboard-forms">
          <!-- Dynamic Forms -->
        </div>
        <div class="dashboard-footer">
          <button id="save-dashboard" class="btn-link btn-primary">Update In-Browser</button>
          <button id="export-btn" class="btn-link">Export data.js</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 3D Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

  <!-- Scripts -->
  <script src="data.js"></script>
  <script src="script.js?v=20260414"></script>
</body>
</html>
